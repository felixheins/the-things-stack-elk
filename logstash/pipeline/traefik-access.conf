# =============================================================================
# Logstash pipeline: Filebeat (Traefik access logs) → Elasticsearch.
#
# Input:  Beats on 5045 — each event already has the Traefik JSON parsed
#         under the `traefik` key (Filebeat's ndjson parser does that).
# Filter: parse StartUTC as @timestamp, lift commonly-queried fields to the
#         top level for cheap aggregation, and drop the noisier headers.
# Output: data stream logs-traefik.access-default (template + ILM are
#         installed by elasticsearch/setup.sh).
# =============================================================================

input {
  beats {
    port => 5045
  }
}

filter {

  # Traefik emits ISO8601 in StartUTC (e.g. "2024-05-13T10:23:45.123456Z").
  # Use it as the canonical event time so dashboards line up with request
  # arrival, not the filebeat read time.
  if [traefik][StartUTC] {
    date {
      match  => ["[traefik][StartUTC]", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => ["_dateparse_failed_traefik_startutc"]
    }
  }

  # Promote frequently-queried request/response fields to top-level so
  # Kibana visualisations can group on them without nested-field overhead.
  mutate {
    rename => {
      "[traefik][ClientHost]"          => "client_ip"
      "[traefik][RequestMethod]"       => "http_method"
      "[traefik][RequestPath]"         => "request_path"
      "[traefik][RequestProtocol]"     => "request_protocol"
      "[traefik][RequestScheme]"       => "request_scheme"
      "[traefik][RequestHost]"         => "request_host"
      "[traefik][RouterName]"          => "router_name"
      "[traefik][ServiceName]"         => "service_name"
      "[traefik][ServiceURL]"          => "service_url"
      "[traefik][DownstreamStatus]"    => "status_code"
      "[traefik][DownstreamContentSize]" => "response_bytes"
      "[traefik][Duration]"            => "duration_ns"
      "[traefik][RequestUserAgent]"    => "user_agent"
      "[traefik][request_User-Agent]"  => "user_agent"
    }
  }

  # Filebeat adds many host/agent/ecs scaffolding fields. Keep the document
  # small for a demo — drop the ones that do not help dashboards here.
  mutate {
    remove_field => ["agent", "ecs", "input", "host", "log"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ES_HOSTS:http://elasticsearch:9200}"]
    user     => "${ES_USER:elastic}"
    password => "${ES_PASSWORD}"

    data_stream           => "true"
    data_stream_type      => "logs"
    data_stream_dataset   => "traefik.access"
    data_stream_namespace => "${DATA_STREAM_NAMESPACE:default}"
  }
}
