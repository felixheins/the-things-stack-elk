# =============================================================================
# Logstash pipeline: TTS forwarder → Elasticsearch.
#
# Input:  newline-delimited JSON over TCP from the forwarder service.
# Filter: parse the TTS event timestamp, dissect the dotted event name,
#         promote frequently-queried entity IDs to top-level fields.
# Output: an Elasticsearch data stream `logs-tts.events-default` whose
#         template + ILM policy were installed by elasticsearch/setup.sh
#         before this pipeline started.
# =============================================================================

input {
  tcp {
    port  => 5044
    codec => json_lines
  }
}

filter {

  # 1) Use the TTS-emitted "time" as the canonical event time.
  if [time] {
    date {
      match  => ["time", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => ["_dateparse_failed_tts_time"]
    }
  }

  # 2) Split the dotted event name into component / category / action so
  #    dashboards can group on each level cheaply.
  #
  #    TTS event names have a variable number of dot segments — 2 for IS
  #    lifecycle events ("application.create"), 3 for most server events
  #    ("gs.gateway.connect"), 4+ for the AS/NS hot path
  #    ("as.up.data.forward", "ns.up.join.cluster.success"). A fixed-arity
  #    dissect would either drop the 2-segment names or smear the action
  #    verb into the middle segments. We split explicitly:
  #      - event_component = first segment   (always present)
  #      - event_category  = second segment  (present when name has ≥2 dots)
  #      - event_action    = last segment    (the action verb)
  if [name] {
    ruby {
      code => '
        parts = event.get("name").to_s.split(".")
        n = parts.length
        event.set("event_component", parts[0]) if n >= 1
        event.set("event_category",  parts[1]) if n >= 2
        event.set("event_action",    parts[-1]) if n >= 2
      '
    }
  }

  # 3) Promote primary entity IDs out of the polymorphic identifiers list.
  if [identifiers] {
    ruby {
      code => '
        ids = event.get("identifiers") || []
        ids.each do |i|
          if (a = i["application_ids"]); event.set("application_id", a["application_id"]); end
          if (g = i["gateway_ids"])
            event.set("gateway_id", g["gateway_id"])
            event.set("gateway_eui", g["eui"]) if g["eui"]
          end
          if (d = i["device_ids"])
            event.set("device_id", d["device_id"])
            event.set("dev_eui",   d["dev_eui"])  if d["dev_eui"]
            event.set("join_eui",  d["join_eui"]) if d["join_eui"]
            event.set("dev_addr",  d["dev_addr"]) if d["dev_addr"]
            if d["application_ids"]
              event.set("application_id", d["application_ids"]["application_id"])
            end
          end
          if (o = i["organization_ids"]); event.set("organization_id", o["organization_id"]); end
          if (u = i["user_ids"]);         event.set("user_id",         u["user_id"]);         end
          if (c = i["client_ids"]);       event.set("client_id",       c["client_id"]);       end
        end
      '
    }
  }

  # 4) Drop fields that explode mapping or carry secrets we do not want indexed.
  mutate {
    remove_field => ["authentication", "user_agent"]
  }
}

output {
  elasticsearch {
    # ES connection is env-driven so the same pipeline can target the
    # in-stack Elasticsearch (defaults) or an external cluster (Elastic
    # Cloud, ECK, self-managed) without editing this file. See README §8.
    hosts    => ["${ES_HOSTS:http://elasticsearch:9200}"]
    user     => "${ES_USER:elastic}"
    password => "${ES_PASSWORD}"

    # Time-based data stream — naming follows the Elastic data-stream scheme.
    # Override DATA_STREAM_NAMESPACE per tenant if you collect events from
    # multiple TTS deployments into the same cluster (see README §10.6).
    data_stream           => "true"
    data_stream_type      => "logs"
    data_stream_dataset   => "tts.events"
    data_stream_namespace => "${DATA_STREAM_NAMESPACE:default}"

    # Use the TTS-supplied unique_id as the doc _id so reconnect retries are
    # idempotent (an overwrite, not a duplicate).
    document_id => "%{unique_id}"
  }
}
