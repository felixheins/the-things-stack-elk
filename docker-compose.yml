# =============================================================================
# tts-elk — single-node ELK stack + forwarder for The Things Stack events.
#
# Lab / demo defaults: HTTP (no TLS) between containers, but with X-Pack
# security and authentication enabled. For production hardening see
# README §10 — Operational considerations.
# =============================================================================

services:
  # ---- Elasticsearch ------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: tts-elk-elasticsearch
    environment:
      - node.name=es01
      - cluster.name=tts-events
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ulimits:
      memlock: { soft: -1, hard: -1 }
    mem_limit: ${ES_MEM_LIMIT}
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    networks: [elk]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -E ''"status":"(green|yellow)"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 60

  # ---- One-shot setup: kibana_system password + ILM + index template -----
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: tts-elk-setup
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
      - RETENTION_DAYS=${RETENTION_DAYS}
    volumes:
      - ./elasticsearch:/setup:ro
    networks: [elk]
    entrypoint: ["/bin/bash", "/setup/setup.sh"]
    restart: "no"

  # ---- Kibana --------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: tts-elk-kibana
    depends_on:
      elasticsearch: { condition: service_healthy }
      setup: { condition: service_completed_successfully }
    environment:
      - SERVER_NAME=tts-elk-kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    mem_limit: ${KB_MEM_LIMIT}
    ports:
      - "${KIBANA_PORT}:5601"
    networks: [elk]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS http://localhost:5601/api/status | grep -q ''"level":"available"''',
        ]
      interval: 15s
      timeout: 5s
      retries: 30

  # ---- Logstash ------------------------------------------------------------
  #
  # Two pipelines, configured via logstash/config/pipelines.yml:
  #   1. tts-events     — TCP/json_lines from the forwarder on 5044
  #   2. traefik-access — Beats from filebeat on 5045
  #
  # Output target defaults to the in-stack Elasticsearch but every field is
  # env-driven, so pointing at Elastic Cloud or a managed cluster is just a
  # matter of overriding ES_HOSTS / ES_USER / ES_PASSWORD in `.env`. See
  # README §8 for the recipe.
  logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION}
    container_name: tts-elk-logstash
    depends_on:
      elasticsearch: { condition: service_healthy }
      setup: { condition: service_completed_successfully }
    environment:
      - LS_JAVA_OPTS=${LS_JAVA_OPTS}
      - ES_HOSTS=${ES_HOSTS:-http://elasticsearch:9200}
      - ES_USER=${ES_USER:-elastic}
      - ES_PASSWORD=${ES_PASSWORD:-${ELASTIC_PASSWORD}}
      - DATA_STREAM_NAMESPACE=${DATA_STREAM_NAMESPACE:-default}
    mem_limit: ${LS_MEM_LIMIT}
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks: [elk]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20

  # ---- Forwarder -----------------------------------------------------------
  forwarder:
    build: ./forwarder
    container_name: tts-elk-forwarder
    depends_on:
      logstash: { condition: service_healthy }
    environment:
      - TTS_HOST=${TTS_HOST}
      - TTS_API_KEY=${TTS_API_KEY}
      - TTS_INSECURE=${TTS_INSECURE}
      - SUBSCRIBE_KINDS=${SUBSCRIBE_KINDS}
      - EVENT_NAMES_REGEX=${EVENT_NAMES_REGEX}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL}
      - STATIC_IDENTIFIERS=${STATIC_IDENTIFIERS}
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    networks: [elk]
    healthcheck:
      # HTTP probe against the forwarder's /healthz endpoint. The image is
      # `python:3.12-slim` (no curl), so we use stdlib urllib — it raises on
      # any non-2xx response, which exits the python process non-zero.
      # `start_period` covers boot + the first heartbeat tick.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ---- Traefik (demo source of access logs) --------------------------------
  #
  # Reverse proxy in front of the `whoami` backend below. Writes one JSON
  # document per request to /var/log/traefik/access.log on the shared
  # `traefik-logs` volume, which the filebeat sidecar tails.
  traefik:
    image: traefik:v3.1
    container_name: tts-elk-traefik
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "${TRAEFIK_HTTP_PORT:-8000}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefiklogs:/var/log/traefik
    networks: [elk]
    restart: unless-stopped

  # ---- whoami (demo backend behind Traefik) --------------------------------
  #
  # Tiny HTTP echo server so requests through Traefik produce real 200s
  # (and 404s if you hit unrouted paths). Generates the access-log volume
  # the demo needs.
  whoami:
    image: traefik/whoami:v1.10
    container_name: tts-elk-whoami
    networks: [elk]
    restart: unless-stopped

  # ---- Filebeat (Traefik access-log shipper) -------------------------------
  #
  # Tails the JSON access log from the shared volume and forwards each line
  # to Logstash's Beats input on port 5045 (the `traefik-access` pipeline).
  filebeat:
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    container_name: tts-elk-filebeat
    # filebeat refuses to start if the config file is group/world-writable.
    # Run as root so it can also read the access log regardless of host umask.
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    depends_on:
      logstash: { condition: service_healthy }
      traefik: { condition: service_started }
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - traefiklogs:/var/log/traefik:ro
      - filebeatdata:/usr/share/filebeat/data
    networks: [elk]
    restart: unless-stopped

volumes:
  esdata:
  traefiklogs:
  filebeatdata:

networks:
  elk:
    driver: bridge
